// ── Touch-drag hook ───────────────────────────────────────────────
function useTouchDrag(list, onReorder) {
  const [draggingIdx, setDraggingIdx] = useState(null);
  const [overIdx, setOverIdx]         = useState(null);
  const longPressTimer = useRef(null);
  const startY = useRef(0);
  const itemRefs = useRef([]);

  const getIdxFromY = useCallback((y) => {
    let best = null, bestDist = Infinity;
    itemRefs.current.forEach((el, i) => {
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const mid  = rect.top + rect.height / 2;
      const dist = Math.abs(y - mid);
      if (dist < bestDist) { bestDist = dist; best = i; }
    });
    return best;
  }, []);

  const onHandleTouchStart = useCallback((e, idx) => {
    e.stopPropagation();
    startY.current = e.touches[0].clientY;
    longPressTimer.current = setTimeout(() => {
      setDraggingIdx(idx);
      setOverIdx(idx);
      if (navigator.vibrate) navigator.vibrate(40);
    }, 200);
  }, []);

  const onTouchMove = useCallback((e) => {
    if (draggingIdx === null) { clearTimeout(longPressTimer.current); return; }
    e.preventDefault();
    const y = e.touches[0].clientY;
    const idx = getIdxFromY(y);
    if (idx !== null) setOverIdx(idx);
  }, [draggingIdx, getIdxFromY]);

  const onTouchEnd = useCallback(() => {
    clearTimeout(longPressTimer.current);
    if (draggingIdx !== null && overIdx !== null && draggingIdx !== overIdx) {
      const arr = [...list];
      const [moved] = arr.splice(draggingIdx, 1);
      arr.splice(overIdx, 0, moved);
      onReorder(arr);
    }
    setDraggingIdx(null);
    setOverIdx(null);
  }, [draggingIdx, overIdx, list, onReorder]);

  const onTouchCancel = useCallback(() => {
    clearTimeout(longPressTimer.current);
    setDraggingIdx(null); setOverIdx(null);
  }, []);

  return { draggingIdx, overIdx, itemRefs, onHandleTouchStart, onTouchMove, onTouchEnd, onTouchCancel };
}

// Platform icon: SVG brand if available, else text/emoji fallback
function PlatIcon({pm, size, radius}) {
  if (pm.svg) {
    return (
      <div style={{width:size,height:size,borderRadius:radius,background:pm.color,flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <div style={{width:size*0.62,height:size*0.62}} dangerouslySetInnerHTML={{__html:pm.svg}}/>
      </div>
    );
  }
  const fs = pm.icon.length > 2 ? (size*0.24) : pm.icon.length === 1 ? (size*0.48) : (size*0.31);
  return (
    <div style={{width:size,height:size,borderRadius:radius,background:pm.color,flexShrink:0,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:fs,fontWeight:900,color:"white"}}>
      {pm.icon}
    </div>
  );
}

function ProgressBar({current,total,color}) {
  if(!total||!current) return null;
  const pct=Math.min(100,Math.round(current/total*100));
  return (
    <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6}}>
      <div style={{flex:1,height:3,background:"rgba(128,128,128,0.2)",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:2,transition:"width 0.3s"}}/>
      </div>
      <span style={{fontSize:10,flexShrink:0,opacity:0.5}}>{pct}%</span>
    </div>
  );
}

function calcWatchTime(s) {
  const min = s.minPerEp || 60;
  const eps = s.episodes || 0;
  if (!eps) return null;
  const total = eps * min;
  const hours = Math.floor(total / 60);
  const mins = total % 60;
  if (hours === 0) return `${mins} דק'`;
  if (mins === 0) return `${hours} שעות`;
  return `${hours}ש' ${mins}דק'`;
}

function SeriesDetails({s,color,t,expanded,onToggle}) {
  const hasAny=s.seasons||s.episodes||s.currentSeason||s.currentEp||s.note||s.minPerEp;
  if(!hasAny) return null;
  const watchTime = calcWatchTime(s);
  return (
    <div style={{marginTop:4}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
        {s.note&&<span style={{fontSize:13,fontWeight:700,color:t.textDim}}>{s.note}</span>}
        {s.seasons&&<span style={{fontSize:10,background:t.pillWant,color:"#6366f1",padding:"1px 7px",borderRadius:10}}>{s.seasons} עונות</span>}
        {s.episodes&&<span style={{fontSize:10,background:t.surface3,color:t.textMuted,padding:"1px 7px",borderRadius:10}}>{s.episodes} פרקים</span>}
        {(s.minPerEp&&s.minPerEp!==60)&&<span style={{fontSize:10,color:t.textFaint}}>⏱ {s.minPerEp} דק'</span>}
        {watchTime&&<span style={{fontSize:10,background:t.surface3,color:t.textMuted,padding:"1px 7px",borderRadius:10}}>🕐 {watchTime}</span>}
        {(s.currentSeason||s.currentEp)&&(
          <span style={{fontSize:10,background:t.pillWatch,color:"#f59e0b",padding:"1px 7px",borderRadius:10,fontWeight:700}}>
            {s.currentSeason?`עונה ${s.currentSeason}`:""}
            {s.currentSeason&&s.currentEp?" · ":""}
            {s.currentEp?`פרק ${s.currentEp}${s.episodes?`/${s.episodes}`:""}` :""}
          </span>
        )}
      </div>
      {s.episodes&&s.currentEp&&<ProgressBar current={s.currentEp} total={s.episodes} color={color}/>}
    </div>
  );
}

      } catch {}
      // Fallback to localStorage
      try { return localStorage.getItem(key); } catch {}
      return null;

    async set(key, val) {

    .row-actions{opacity:0;transition:opacity 0.15s;display:flex;gap:2px;flex-shrink:0;}
    .handle{touch-action:none;cursor:grab;color:${t.textFaint};font-size:16px;padding:2px 2px;line-height:1;user-select:none;flex-shrink:0;}
    .sbtn{width:26px;height:26px;border-radius:50%;border:2px solid;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all 0.2s;flex-shrink:0;margin-top:2px;}
    .sbtn:hover{transform:scale(1.15);}
    .ibtn{background:transparent;border:none;cursor:pointer;color:${t.textFaint};padding:4px 5px;border-radius:6px;font-size:13px;transition:color 0.12s;line-height:1;}
    .ibtn:hover{color:${t.textMuted};}
    .pill{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0;}
    .fbtn{padding:5px 12px;border-radius:20px;border:1px solid ${t.border2};background:transparent;color:${t.textDim};font-size:12px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all 0.12s;}
    .fbtn.on{background:${t.tabActiveBg};color:${t.tabActiveText};border-color:${t.border3};}
    .inp{background:${t.inputBg};border:1px solid ${t.border2};border-radius:10px;padding:9px 12px;color:${t.text};font-size:14px;outline:none;width:100%;font-family:'Heebo',sans-serif;direction:rtl;transition:border-color 0.15s;}
    .inp:focus{border-color:#6366f1;}
    .inp-sm{background:${t.inputBg};border:1px solid ${t.border2};border-radius:8px;padding:7px 10px;color:${t.text};font-size:13px;outline:none;font-family:'Heebo',sans-serif;direction:rtl;transition:border-color 0.15s;width:100%;}
    .inp-sm:focus{border-color:#6366f1;}
    .abtn{background:#4338ca;color:white;border:none;border-radius:10px;padding:9px 18px;cursor:pointer;font-size:14px;font-family:'Heebo',sans-serif;font-weight:700;transition:background 0.12s;white-space:nowrap;}
    .abtn:hover{background:#3730a3;}
    .xbtn{background:${t.surface};color:${t.textMuted};border:1px solid ${t.border2};border-radius:10px;padding:9px 14px;cursor:pointer;font-size:14px;font-family:'Heebo',sans-serif;transition:all 0.12s;white-space:nowrap;}
    .xbtn:hover{color:${t.text};}
    .stat{flex:1;background:${t.surface};border:1px solid ${t.border};border-radius:12px;padding:12px 8px;text-align:center;}
    .back{background:${t.surface};border:1px solid ${t.border};color:${t.textMuted};border-radius:10px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:5px;transition:all 0.12s;}
    .back:hover{color:${t.text};border-color:${t.border3};}
    .dashed{width:100%;padding:12px;border-radius:14px;background:transparent;border:1.5px dashed ${t.border2};color:${t.textFaint};cursor:pointer;font-size:13px;font-family:'Heebo',sans-serif;transition:all 0.15s;}
    .dashed:hover{border-color:${t.border3};color:${t.textMuted};}
    .field-label{font-size:10px;color:${t.textMuted};margin-bottom:3px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .edit-box{background:${t.editBg};border:1px solid ${t.border2};border-radius:12px;padding:12px;margin-top:6px;}
    .main-tab{flex:1;padding:10px 0;font-size:15px;font-weight:700;font-family:'Heebo',sans-serif;border:none;cursor:pointer;transition:all 0.2s;border-radius:12px;}
    .drag-hint{font-size:10px;color:${t.textFaint};text-align:center;padding:6px 0 0;letter-spacing:0.02em;}
  `;


  const IconColorPicker = ({icon, color, onIcon, onColor}) => (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div>
        <div className="field-label">אייקון</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
          {ICON_OPTIONS.map(ic=>(
            <button key={ic} onClick={()=>onIcon(ic)} style={{
              width:34,height:34,borderRadius:8,fontSize:18,
              background:icon===ic?color:"transparent",
              border:`2px solid ${icon===ic?color:t.border2}`,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              transition:"all 0.15s",
            }}>{ic}</button>
          ))}
        </div>
      </div>
      <div>
        <div className="field-label">צבע</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
          {COLOR_OPTIONS.map(c=>(
            <button key={c} onClick={()=>onColor(c)} style={{
              width:26,height:26,borderRadius:6,background:c,
              border:`3px solid ${color===c?"white":"transparent"}`,
              outline:`2px solid ${color===c?c:"transparent"}`,
              cursor:"pointer",transition:"all 0.15s",
            }}/>
          ))}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:40,height:40,borderRadius:10,background:color,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
          {icon}
        </div>
        <span style={{fontSize:12,color:t.textMuted}}>תצוגה מקדימה</span>
      </div>
    </div>
  );

  const NumInput=({label,value,onChange})=>(
    <div><div className="field-label">{label}</div>
      <input className="inp-sm" type="number" min="1" placeholder="—" value={value} onChange={e=>onChange(e.target.value)}/>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:t.bg,color:t.text,fontFamily:"'Heebo',sans-serif",direction:"rtl",transition:"background 0.25s,color 0.25s"}}
      onTouchMove={view ? seriesDrag.onTouchMove : platDrag.onTouchMove}
      onTouchEnd={view ? seriesDrag.onTouchEnd : platDrag.onTouchEnd}
      onTouchCancel={view ? seriesDrag.onTouchCancel : platDrag.onTouchCancel}
    >
      <style>{css}</style>
      <div style={{maxWidth:500,margin:"0 auto",padding:"20px 14px 80px"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:26}}>🎬</span>
            <div>
              <h1 style={{fontSize:22,fontWeight:900,letterSpacing:"-0.5px"}}>התוכניות שלי</h1>
              <p style={{fontSize:11,color:t.textFaint,marginTop:1}}>Watch List</p>
            </div>
          </div>
          <button onClick={()=>setIsDark(d=>!d)} style={{
            background:t.surface,border:`1px solid ${t.border}`,borderRadius:20,
            padding:"7px 14px",cursor:"pointer",fontSize:13,color:t.textMuted,
            fontFamily:"'Heebo',sans-serif",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",
          }}>{isDark?"☀️ בהיר":"🌙 כהה"}</button>
        </div>

        {/* Main Tabs */}
        {!view&&(
          <div style={{display:"flex",gap:6,marginBottom:18,background:t.surface3,borderRadius:14,padding:4}}>
            {[["series","📺 סדרות"],["movies","🎬 סרטים"]].map(([tab,label])=>(
              <button key={tab} className="main-tab"
                style={{background:mainTab===tab?t.surface:"transparent",color:mainTab===tab?t.text:t.textMuted,
                  boxShadow:mainTab===tab?`0 1px 6px rgba(0,0,0,${isDark?0.3:0.1})`:"none"}}
                onClick={()=>{setMainTab(tab);setSearch("");setFilter("all");}}>
                {label}
              </button>
            ))}
          </div>
        )}

        {/* Stats */}
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {[["צופה כעת",statFor("watching"),"#f59e0b"],["רוצה לראות",statFor("want"),"#6366f1"],
            ["סיימתי",statFor("done"),"#22c55e"],["סה׳׳כ",tabActive.length,t.textMuted]].map(([label,val,color])=>(
            <div key={label} className="stat">
              <div style={{fontSize:22,fontWeight:900,color}}>{val}</div>
              <div style={{fontSize:10,color:t.textFaint,marginTop:2}}>{label}</div>
            </div>
          ))}
          {remainingLabel&&(
            <div className="stat" style={{background:isDark?"#0d0d1a":"#f0f0ff",border:`1px solid ${isDark?"#1e1e3a":"#d4d4f0"}`}}>
              <div style={{fontSize:22,fontWeight:900,color:"#6366f1"}}>🕐</div>
              <div style={{fontSize:16,fontWeight:900,color:"#6366f1",lineHeight:1.1}}>{remainingLabel}</div>
              <div style={{fontSize:9,color:t.textFaint,marginTop:2}}>זמן נותר</div>
            </div>
          )}
        </div>


        {/* ── HOME ── */}
        {!view ? (
          <>
            <input className="inp" placeholder="🔍  חיפוש..." value={search}
              onChange={e=>setSearch(e.target.value)} style={{marginBottom:14}}/>

            {search&&(
              <div style={{marginBottom:14}}>
                {currentTabOrder.map(pName=>{
                  const hits=(data[pName]||[]).filter(s=>s.name.includes(search)||(s.note||"").includes(search));
                  if(!hits.length) return null;
                  const pm2=getPMeta(pName);
                  return (
                    <div key={pName} style={{marginBottom:10}}>
                      <div style={{fontSize:11,color:t.textMuted,marginBottom:4,paddingRight:4}}>{pName}</div>
                      {hits.map(s=>(
                        <div key={s.id} className="series-row">
                          <div style={{width:8,height:8,borderRadius:"50%",background:pm2.color,marginTop:6,flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14,color:t.text2}}>{s.name}</div>
                            <SeriesDetails s={s} color={pm2.color} t={t}/>
                          </div>
                          <span style={{fontSize:11,color:STATUS_COLORS[s.status],flexShrink:0}}>{STATUS_LABELS[s.status]}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
                {currentTabOrder.every(p=>!(data[p]||[]).some(s=>s.name.includes(search)||(s.note||"").includes(search)))&&(
                  <div style={{textAlign:"center",color:t.textFaint,padding:"24px 0",fontSize:13}}>לא נמצאו תוצאות</div>
                )}
              </div>
            )}

            {!search&&(
              <>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {currentTabOrder.map((pName,i)=>{
                    const list=data[pName]||[];
                    const active=list.filter(s=>s.status!=="done");
                    const watching=active.filter(s=>s.status==="watching").length;
                    const want=active.filter(s=>s.status==="want").length;
                    const done=list.filter(s=>s.status==="done").length;
                    const pm2=getPMeta(pName);
                    const isDragging=platDrag.draggingIdx===i;
                    const isOver=platDrag.overIdx===i&&platDrag.draggingIdx!==null&&platDrag.draggingIdx!==i;
                    const isRenaming=editingPlatName===pName;
                    return (
                      <div key={pName} ref={el=>platDrag.itemRefs.current[i]=el}
                        className={`card${isDragging?" is-dragging":""}${isOver?" drag-over":""}`}
                        onClick={()=>{if(isRenaming||platDrag.draggingIdx!==null) return; setView(pName);setFilter("all");setSearch("");}}>
                        {/* drag handle */}
                        <span className="handle"
                          onTouchStart={e=>platDrag.onHandleTouchStart(e,i)}
                          onClick={e=>e.stopPropagation()}>⠿</span>
                        <PlatIcon pm={pm2} size={42} radius={11}/>
                        <div style={{flex:1,minWidth:0}}>
                          {isRenaming?(
                            <div onClick={e=>e.stopPropagation()} style={{display:"flex",flexDirection:"column",gap:8}}>
                              <div><div className="field-label">שם</div>
                                <input className="inp-sm" value={newPlatRename}
                                  onChange={e=>setNewPlatRename(e.target.value)} autoFocus
                                  onKeyDown={e=>{if(e.key==="Enter")renamePlatform(pName);if(e.key==="Escape")setEditingPlatName(null);}}/>
                              </div>
                              <IconColorPicker icon={renamePlatIcon} color={renamePlatColor} onIcon={setRenamePlatIcon} onColor={setRenamePlatColor}/>
                              <div style={{display:"flex",gap:6}}>
                                <button className="abtn" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>renamePlatform(pName)}>שמור</button>
                                <button className="xbtn" style={{fontSize:12,padding:"5px 8px"}} onClick={()=>setEditingPlatName(null)}>✕</button>
                              </div>
                            </div>
                          ):(
                            <>
                              <div style={{fontWeight:700,fontSize:15,color:t.text}}>{pName}</div>
                              <div style={{fontSize:13,fontWeight:700,color:t.textFaint,marginTop:2}}>
                                {active.length} פריטים
                                {done>0&&<span style={{fontSize:12,fontWeight:700,marginRight:4}}>· {done} סיימתי</span>}
                              </div>
                            </>
                          )}
                        </div>
                        {!isRenaming&&(
                          <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
                            {watching>0&&<span className="pill" style={{background:watchPillBg,color:watchPillColor}}>▶ {watching}</span>}
                            {want>0&&<span className="pill" style={{background:wantPillBg,color:wantPillColor}}>○ {want}</span>}
                            {done>0&&<span className="pill" style={{background:donePillBg,color:donePillColor}}>✓ {done}</span>}
                            <button className="ibtn" onClick={e=>{e.stopPropagation();setEditingPlatName(pName);setNewPlatRename(pName);const m=getPMeta(pName);setRenamePlatIcon(m.icon||"📺");setRenamePlatColor(m.color||"#334155");}}>✏️</button>
                            <button className="ibtn" style={{opacity:0.35}} onClick={e=>{e.stopPropagation();deletePlatform(pName);}}>🗑</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <p className="drag-hint">החזק את ⠿ וגרור למיון</p>
                <div style={{marginTop:8}}>
                  {addingPlatform?(
                    <div style={{background:t.surface2,borderRadius:14,padding:14,border:`1px solid ${t.border}`}}>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        <div><div className="field-label">שם הקטגוריה *</div>
                          <input className="inp" placeholder="שם..." value={newPlatName}
                            onChange={e=>setNewPlatName(e.target.value)} autoFocus
                            onKeyDown={e=>{if(e.key==="Enter")addPlatform();if(e.key==="Escape"){setAddingPlatform(false);setNewPlatName("");}}}/>
                        </div>
                        <IconColorPicker icon={newPlatIcon} color={newPlatColor} onIcon={setNewPlatIcon} onColor={setNewPlatColor}/>
                        <div style={{display:"flex",gap:8}}>
                          <button className="abtn" onClick={addPlatform}>הוסף</button>
                          <button className="xbtn" onClick={()=>{setAddingPlatform(false);setNewPlatName("");}}>✕</button>
                        </div>
                      </div>
                    </div>
                  ):(
                    <button className="dashed" onClick={()=>setAddingPlatform(true)}>+ הוסף קטגוריה</button>
                  )}
                </div>
              </>
            )}
          </>
        ) : (
          /* ── PLATFORM VIEW ── */
          <>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <button className="back" onClick={()=>{setView(null);setSearch("");setFilter("all");setAddingSeries(false);setEditing(null);}}>← חזרה</button>
              <PlatIcon pm={pm} size={34} radius={9}/>
              <h2 style={{fontWeight:800,fontSize:18,flex:1,color:t.text}}>{view}</h2>
            </div>

            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {["all","watching","want","done"].map(f=>{
                const cnt=f==="all"?(data[view]||[]).filter(s=>s.status!=="done").length:(data[view]||[]).filter(s=>s.status===f).length;
                return (
                  <button key={f} className={`fbtn ${filter===f?"on":""}`} onClick={()=>setFilter(f)}>
                    {f==="all"?"הכל":STATUS_LABELS[f]} <span style={{opacity:0.5}}>{cnt}</span>
                  </button>
                );
              })}
            </div>

            <input className="inp" placeholder="🔍  חפש..." value={search}
              onChange={e=>setSearch(e.target.value)} style={{marginBottom:10,fontSize:13}}/>

            {filter==="all"&&!search&&(data[view]||[]).some(s=>s.status==="watching")&&(
              <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:6,paddingRight:4}}>▶ צופה כעת</div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              {currentList.length===0&&(
                <div style={{textAlign:"center",color:t.textFaint,padding:"28px 0",fontSize:13}}>
                  {search?"לא נמצאו תוצאות":"אין פריטים — הוסף למטה ↓"}
                </div>
              )}
              {currentList.map((s,visIdx)=>{
                const isDone=s.status==="done";
                const dragIdx=!isDone?nonDoneList.findIndex(x=>x.id===s.id):-1;
                const isDragging=!isDone&&seriesDrag.draggingIdx===dragIdx;
                const isOver=!isDone&&seriesDrag.overIdx===dragIdx&&seriesDrag.draggingIdx!==null&&seriesDrag.draggingIdx!==dragIdx;
                const prevS=visIdx>0?currentList[visIdx-1]:null;
                const showSep=filter==="all"&&!search&&prevS&&prevS.status==="watching"&&s.status==="want";
                return (
                  <div key={s.id}>
                    {showSep&&(
                      <div style={{fontSize:11,fontWeight:700,color:t.textMuted,marginTop:10,marginBottom:6,paddingRight:4}}>○ רוצה לראות</div>
                    )}
                    <div ref={!isDone?el=>seriesDrag.itemRefs.current[dragIdx]=el:null}
                      className={`series-row${isDragging?" is-dragging":""}${isOver?" drag-over":""}`}
                      style={{flexDirection:"column",alignItems:"stretch"}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                        {!isDone?(
                          <span className="handle"
                            onTouchStart={e=>seriesDrag.onHandleTouchStart(e,dragIdx)}>⠿</span>
                        ):(
                          <span style={{width:20,flexShrink:0}}/>
                        )}
                        <button className="sbtn"
                          style={{borderColor:STATUS_COLORS[s.status],color:STATUS_COLORS[s.status]}}
                          onClick={()=>toggle(view,s.id)}>
                          {STATUS_ICONS[s.status]}
                        </button>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:15,fontWeight:500,lineHeight:1.3,
                            color:isDone?t.textMuted:t.text2,
                            textDecoration:isDone?"line-through":"none"}}>
                            {s.name}
                          </div>
                          {editing!==s.id&&<SeriesDetails s={s} color={pm.color} t={t}/>}
                        </div>
                        {editing!==s.id&&(
                          <div className="row-actions">
                            <button className="ibtn" onClick={()=>startEdit(s)}>✏️</button>
                            <button className="ibtn" onClick={()=>deleteSeries(view,s.id,s.name)}>🗑</button>
                          </div>
                        )}
                      </div>
                      {editing===s.id&&(
                        <div className="edit-box">
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            <div><div className="field-label">שם</div>
                              <input className="inp-sm" value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))} autoFocus
                                onKeyDown={e=>{if(e.key==="Escape")setEditing(null);}}/>
                            </div>
                            <div><div className="field-label">הערה</div>
                              <input className="inp-sm" placeholder="פלטפורמה, שם ישראלי..." value={ef.note} onChange={e=>setEf(p=>({...p,note:e.target.value}))}/>
                            </div>
                            <div className="grid2">
                              <NumInput label="מספר עונות" value={ef.seasons} onChange={v=>setEf(p=>({...p,seasons:v}))}/>
                              <NumInput label="מספר פרקים" value={ef.episodes} onChange={v=>setEf(p=>({...p,episodes:v}))}/>
                            </div>
                            <div><div className="field-label">⏱ דקות לפרק</div>
                              <input className="inp-sm" type="number" min="1" max="300" placeholder="60"
                                value={ef.minPerEp} onChange={e=>setEf(p=>({...p,minPerEp:e.target.value}))}/>
                            </div>
                            <div style={{background:t.editInner,borderRadius:8,padding:"10px",border:`1px solid ${t.border}`}}>
                              <div style={{fontSize:10,color:"#f59e0b",marginBottom:6,fontWeight:700}}>📍 אני נמצא ב...</div>
                              <div className="grid2">
                                <NumInput label="עונה נוכחית" value={ef.currentSeason} onChange={v=>setEf(p=>({...p,currentSeason:v}))}/>
                                <NumInput label="פרק נוכחי" value={ef.currentEp} onChange={v=>setEf(p=>({...p,currentEp:v}))}/>
                              </div>
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <button className="abtn" style={{fontSize:13,padding:"7px 14px"}} onClick={()=>saveEdit(view,s.id)}>שמור</button>
                              <button className="xbtn" style={{fontSize:13,padding:"7px 12px"}} onClick={()=>setEditing(null)}>ביטול</button>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="drag-hint" style={{marginTop:8}}>החזק את ⠿ וגרור למיון</p>

            <div style={{marginTop:8}}>
              {addingSeries?(
                <div style={{background:t.surface2,borderRadius:14,padding:14,border:`1px solid ${t.border}`}}>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <div><div className="field-label">שם *</div>
                      <input className="inp" placeholder="שם..." value={nf.name}
                        onChange={e=>setNf(p=>({...p,name:e.target.value}))} autoFocus
                        onKeyDown={e=>{if(e.key==="Escape"){setAddingSeries(false);setNf(EN);}}}/>
                    </div>
                    <div><div className="field-label">הערה (אופציונלי)</div>
                      <input className="inp" placeholder="שם ישראלי, פלטפורמה..." value={nf.note}
                        onChange={e=>setNf(p=>({...p,note:e.target.value}))}/>
                    </div>
                    <div className="grid2">
                      <NumInput label="מספר עונות" value={nf.seasons} onChange={v=>setNf(p=>({...p,seasons:v}))}/>
                      <NumInput label="מספר פרקים" value={nf.episodes} onChange={v=>setNf(p=>({...p,episodes:v}))}/>
                    </div>
                    <div><div className="field-label">⏱ דקות לפרק (ברירת מחדל 60)</div>
                      <input className="inp-sm" type="number" min="1" max="300" placeholder="60"
                        value={nf.minPerEp} onChange={e=>setNf(p=>({...p,minPerEp:e.target.value}))}/>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="abtn" onClick={addSeries}>הוסף</button>
                      <button className="xbtn" onClick={()=>{setAddingSeries(false);setNf(EN);}}>ביטול</button>
                    </div>
                  </div>
                </div>
              ):(
                <button className="dashed" onClick={()=>setAddingSeries(true)}>+ הוסף פריט</button>
              )}
            </div>
          </>
        )}

        {/* Export / Import */}
        <div style={{marginTop:20,display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
          <button onClick={exportData} style={{
            background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,
            padding:"8px 16px",cursor:"pointer",fontSize:13,color:t.textMuted,
            fontFamily:"'Heebo',sans-serif",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",
          }}>
            ⬇️ ייצוא גיבוי
          </button>
          <button onClick={()=>setShowImportText(true)} style={{
            background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,
            padding:"8px 16px",cursor:"pointer",fontSize:13,color:t.textMuted,
            fontFamily:"'Heebo',sans-serif",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",
          }}>
            ⬆️ ייבוא גיבוי
          </button>
          {importSuccess&&(
            <span style={{fontSize:12,color:"#22c55e",fontWeight:700}}>✓ יובא בהצלחה!</span>
          )}
        </div>

        <div style={{marginTop:12,padding:"10px 16px",background:t.surface3,borderRadius:12,border:`1px solid ${t.border}`,
          display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
          {Object.entries(STATUS_LABELS).map(([v,label])=>(
            <div key={v} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:t.textMuted}}>
              <span style={{color:STATUS_COLORS[v],fontWeight:700,fontSize:13}}>{STATUS_ICONS[v]}</span>{label}
            </div>
          ))}
        </div>
        <div style={{textAlign:"center",fontSize:10,color:t.textFaint,marginTop:8}}>
          לחץ על הסמל לשינוי סטטוס • נשמר אוטומטית
        </div>
      </div>

      {/* ── Import Text Modal ── */}
      {showImportText&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}}
          onClick={()=>setShowImportText(false)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:t.surface,borderRadius:"20px 20px 0 0",
            padding:"20px 20px 36px",width:"100%",maxWidth:520,
            display:"flex",flexDirection:"column",gap:12,direction:"rtl",
          }}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <h3 style={{fontSize:17,fontWeight:800,color:t.text}}>⬆️ ייבוא גיבוי</h3>
              <button onClick={()=>setShowImportText(false)} style={{background:"transparent",border:"none",
                fontSize:20,cursor:"pointer",color:t.textMuted}}>✕</button>
            </div>
            <p style={{fontSize:12,color:t.textMuted,lineHeight:1.6}}>הדבק כאן את טקסט הגיבוי שייצאת קודם:</p>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder="הדבק כאן את הגיבוי..."
              style={{
                height:160,background:t.surface2,border:`1px solid ${t.border}`,
                borderRadius:10,padding:10,color:t.text,fontSize:11,
                fontFamily:"monospace",resize:"none",direction:"ltr",
                outline:"none",
              }}/>
            <button onClick={()=>importFromText(importText)} style={{
              background:"#4338ca",color:"white",border:"none",
              borderRadius:12,padding:"13px",fontSize:15,fontWeight:700,
              fontFamily:"'Heebo',sans-serif",cursor:"pointer",
            }}>
              ייבא נתונים
            </button>
            <p style={{fontSize:10,color:"#ef4444",textAlign:"center"}}>
              ⚠️ פעולה זו תחליף את כל הנתונים הקיימים
            </p>
          </div>
        </div>
      )}

      {/* ── Export Modal ── */}
      {showExport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,padding:"0"}}
          onClick={()=>setShowExport(false)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:t.surface,borderRadius:"20px 20px 0 0",
            padding:"20px 20px 36px",width:"100%",maxWidth:520,
            maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12,
            direction:"rtl",
          }}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <h3 style={{fontSize:17,fontWeight:800,color:t.text}}>⬇️ ייצוא גיבוי</h3>
              <button onClick={()=>setShowExport(false)} style={{background:"transparent",border:"none",
                fontSize:20,cursor:"pointer",color:t.textMuted}}>✕</button>
            </div>
            <p style={{fontSize:12,color:t.textMuted,lineHeight:1.6}}>
              העתק את הטקסט הזה ושמור אותו בפתק / Notes / קובץ טקסט ב-iCloud Drive.
              בייבוא — הדבק חזרה דרך כפתור "ייבוא טקסט".
            </p>
            <textarea id="export-textarea" readOnly value={exportJson}
              style={{
                flex:1,minHeight:180,background:t.surface2,border:`1px solid ${t.border}`,
                borderRadius:10,padding:10,color:t.textMuted,fontSize:10,
                fontFamily:"monospace",resize:"none",direction:"ltr",lineHeight:1.4,
              }}/>
            <button onClick={copyExport} style={{
              background:copied?"#22c55e":"#4338ca",color:"white",border:"none",
              borderRadius:12,padding:"13px",fontSize:15,fontWeight:700,
              fontFamily:"'Heebo',sans-serif",cursor:"pointer",transition:"background 0.2s",
            }}>
              {copied ? "✓ הועתק!" : "📋 העתק הכל"}
            </button>
          </div>
        </div>
      )}

      {/* ── Confirm Dialog ── */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"0 24px"}}
          onClick={()=>setConfirm(null)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:t.surface,border:`1px solid ${t.border3}`,borderRadius:20,
            padding:"28px 24px",maxWidth:320,width:"100%",textAlign:"center",
            boxShadow:"0 20px 60px rgba(0,0,0,0.5)",direction:"rtl",
          }}>
            <div style={{fontSize:32,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:700,color:t.text,marginBottom:8}}>{confirm.message}</div>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:24}}>לא ניתן לבטל פעולה זו</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirm(null)} style={{
                flex:1,padding:"11px 0",borderRadius:12,border:`1px solid ${t.border2}`,
                background:t.surface2,color:t.textMuted,fontSize:15,fontWeight:600,
                cursor:"pointer",fontFamily:"'Heebo',sans-serif",
              }}>ביטול</button>
              <button onClick={()=>{confirm.onOk();setConfirm(null);}} style={{
                flex:1,padding:"11px 0",borderRadius:12,border:"none",
                background:"#dc2626",color:"white",fontSize:15,fontWeight:700,
                cursor:"pointer",fontFamily:"'Heebo',sans-serif",
              }}>מחק</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  </script>
</body>
</html>
